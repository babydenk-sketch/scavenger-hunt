<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burbank Scavenger Hunt</title>
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #f0f4f8; 
            color: #222; 
            text-align: center; 
        }
        h1 { color: #1a73e8; }
        .stage { 
            background: white; 
            border-radius: 16px; 
            padding: 25px; 
            margin: 20px auto; 
            max-width: 600px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        }
        button { 
            background: #1a73e8; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            border-radius: 50px; 
            cursor: pointer; 
            margin: 10px; 
        }
        button:hover { background: #0d5fd1; }
        #status { font-weight: bold; margin: 15px 0; color: #333; }
    </style>
</head>
<body>
    <h1>🗺️ Burbank Scavenger Hunt - v2</h1>
    <div id="game" class="stage">
        <h2 id="clueTitle">Starting the Hunt...</h2>
        <p id="clueText">Welcome to Burbank! Tap "Start" to get your first clue.</p>
        <button onclick="startHunt()">Start Hunt</button>
        <div id="nextBtn" style="display:none;">
            <button onclick="navigateToNext()">Open Google Maps Directions</button>
        </div>
    </div>
    <p id="status"></p>

    <script>
        const locations = [
            {
                id: 1,
                lat: 34.18194,
                lng: -118.30750,
                clue: "Start at the heart of the city — the beautiful Burbank City Hall with its iconic architecture.",
                question: "You've arrived! What year was this City Hall built?"
            },
            {
                id: 2,
                lat: 34.14889,
                lng: -118.33750,
                clue: "Head toward the famous movie studio with the big 'WB' logo. Look for the iconic water tower!",
                question: "Great job! What famous studio are you at?"
            },
            {
                id: 3,
                lat: 34.1675,
                lng: -118.3400,
                clue: "Go to the charming shopping street full of vintage shops, cafes, and that classic Burbank vibe.",
                question: "You're there! What's the name of this popular shopping area?"
            },
            {
                id: 4,
                lat: 34.1800,
                lng: -118.3200,
                clue: "Find the peaceful green space with walking paths and great views of the hills.",
                question: "Nice work! What's the name of this park?"
            },
            {
                id: 5,
                lat: 34.2000,
                lng: -118.3500,
                clue: "Last stop — head to the aviation landmark with historic planes.",
                question: "🎉 You made it to the final spot!"
            }
        ];

        let currentStage = 0;
        let watchId = null;
        const proximityRadius = 60;

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function checkLocation(position) {
            const playerLat = position.coords.latitude;
            const playerLng = position.coords.longitude;
            const target = locations[currentStage];
            const distance = haversineDistance(playerLat, playerLng, target.lat, target.lng);
            
            document.getElementById("status").innerHTML = distance <= proximityRadius 
                ? `✅ You're at the spot!` 
                : `📍 ${Math.round(distance)} meters away.`;
            
            if (distance <= proximityRadius) showNextQuestion();
        }

        function showNextQuestion() {
            currentStage++;
            const target = locations[currentStage - 1];
            document.getElementById("clueTitle").textContent = `Spot ${currentStage} / ${locations.length}`;
            document.getElementById("clueText").innerHTML = `
                <strong>You made it!</strong><br><br>
                ${target.question}<br><br>
                <em>Next clue:</em> ${locations[currentStage] ? locations[currentStage].clue : "<strong>🎉 Congratulations! You completed the Burbank Scavenger Hunt!</strong>"}
            `;
            document.getElementById("nextBtn").style.display = locations[currentStage] ? "block" : "none";
        }

        function navigateToNext() {
            if (currentStage >= locations.length) return;
            const next = locations[currentStage];
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${next.lat},${next.lng}&travelmode=walking`, "_blank");
        }

        function startHunt() {
            document.getElementById("clueTitle").textContent = "First Clue";
            document.getElementById("clueText").innerHTML = locations[0].clue + "<br><br><em>Tap below for directions when ready.</em>";
            document.getElementById("nextBtn").style.display = "block";

            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(checkLocation, 
                    () => document.getElementById("status").textContent = "⚠️ Please enable location access",
                    { enableHighAccuracy: true }
                );
            }
        }
    </script>
</body>
</html>
